<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClashKing Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Saira+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root{
    --bg-void: #08080a;
    --bg-panel: #14131a;
    --bg-card: #1c1a24;
    --line: #2e2b38;
    --flame: #d4920a;
    --flame-dim: #d4920a33;
    --cyan: #2ee6d6;
    --cyan-dim: #2ee6d633;
    --gold: #ffc23c;
    --text-hi: #f4f5f7;
    --text-mid: #9aa0ad;
    --text-low: #5b6170;
    --danger: #ff3b5c;
    --success: #3ddc84;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background: var(--bg-void);
    background-image: radial-gradient(circle at 10% 0%, #ff4d2e10, transparent 40%);
    color: var(--text-hi);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
  }
  h1,h2,h3{ font-family: 'Saira Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.02em; }

  /* Layout */
  .layout{ display:flex; min-height:100vh; }
  .sidebar{
    width: 220px; background: var(--bg-panel); border-right:1px solid var(--line);
    padding: 22px 14px; display:flex; flex-direction:column; flex-shrink:0;
  }
  .sb-brand{ display:flex; align-items:center; gap:10px; padding: 0 8px 26px; }
  .sb-mark{ width:34px;height:34px; border-radius:9px; background: linear-gradient(135deg,var(--flame),#ff8a3c); display:flex; align-items:center; justify-content:center; font-size:14px; }
  .sb-name{ font-family:'Saira Condensed'; font-weight:800; font-size:16px; text-transform:uppercase; }
  .sb-name span{ color:var(--flame); }
  .sb-name small{ display:block; font-size:9.5px; color:var(--text-low); letter-spacing:0.05em; font-weight:600; }

  .nav-link{
    display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:9px;
    color: var(--text-mid); font-weight:700; font-size:13.5px; cursor:pointer; margin-bottom:3px;
    border:none; background:none; width:100%; text-align:left;
  }
  .nav-link i{ width:16px; font-size:14px; }
  .nav-link:hover{ background: var(--bg-card); color: var(--text-hi); }
  .nav-link.active{ background: var(--flame-dim); color: var(--flame); }

  .sidebar-bottom{ margin-top:auto; }
  .logout-link{ color: var(--danger); }

  .main{ flex:1; padding: 26px 30px; overflow-x:hidden; }
  .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
  .page-title{ font-size:22px; }
  .page-sub{ color:var(--text-mid); font-size:13px; margin-top:2px; }

  .btn{
    border:none; border-radius:10px; padding:11px 18px; font-family:'Rajdhani'; font-weight:700;
    font-size:13.5px; cursor:pointer; display:inline-flex; align-items:center; gap:8px;
  }
  .btn-primary{ background: linear-gradient(135deg,var(--flame),#ff7a3c); color:#fff; box-shadow:0 8px 20px -10px var(--flame-dim); }
  .btn-secondary{ background: var(--bg-card); color: var(--text-hi); border:1px solid var(--line); }
  .btn-success{ background: var(--success); color:#06140c; }
  .btn-danger{ background: transparent; color: var(--danger); border:1px solid #ff3b5c44; }
  .btn-sm{ padding:7px 12px; font-size:12px; }
  .btn:disabled{ opacity:0.5; cursor:not-allowed; }

  /* Stat cards */
  .stat-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
  .stat-card{ background: var(--bg-card); border:1px solid var(--line); border-radius:14px; padding:18px; }
  .stat-card .si{ width:34px;height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; margin-bottom:10px; font-size:14px; }
  .stat-card .sv{ font-family:'Saira Condensed'; font-weight:800; font-size:24px; }
  .stat-card .sl{ font-size:11.5px; color:var(--text-mid); font-weight:600; }

  /* Table */
  .panel{ background: var(--bg-card); border:1px solid var(--line); border-radius:14px; overflow:hidden; margin-bottom:20px; }
  .panel-head{ padding:16px 18px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
  .panel-head h3{ font-size:15px; }
  table{ width:100%; border-collapse:collapse; }
  th{ text-align:left; padding:11px 16px; font-size:11px; color:var(--text-low); text-transform:uppercase; letter-spacing:0.04em; border-bottom:1px solid var(--line); font-weight:700; }
  td{ padding:13px 16px; border-bottom:1px solid var(--line); font-size:13.5px; }
  tr:last-child td{ border-bottom:none; }
  tr:hover td{ background:#ffffff04; }

  .badge{ display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; }
  .badge.free{ background: var(--cyan-dim); color: var(--cyan); }
  .badge.paid{ background:#ffc23c22; color:var(--gold); }
  .badge.upcoming{ background:#9aa0ad22; color:var(--text-mid); }
  .badge.live{ background:#3ddc8422; color:var(--success); }
  .badge.completed{ background:#2ee6d622; color:var(--cyan); }
  .badge.cancelled{ background:#ff3b5c22; color:var(--danger); }
  .badge.pending{ background:#ffc23c22; color:var(--gold); }
  .badge.verified{ background:#3ddc8422; color:var(--success); }
  .badge.rejected{ background:#ff3b5c22; color:var(--danger); }

  /* Modal */
  .modal-overlay{ position:fixed; inset:0; background:#000000c0; display:none; align-items:center; justify-content:center; z-index:200; padding:20px; }
  .modal-overlay.show{ display:flex; }
  .modal{ background: var(--bg-panel); border:1px solid var(--line); border-radius:16px; width:100%; max-width:520px; max-height:88vh; overflow-y:auto; }
  .modal-head{ padding:18px 22px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:var(--bg-panel); }
  .modal-head h3{ font-size:17px; }
  .modal-close{ background:none; border:none; color:var(--text-mid); font-size:18px; cursor:pointer; }
  .modal-body{ padding:20px 22px; }

  .field{ margin-bottom:14px; }
  .field label{ font-size:11.5px; color:var(--text-mid); font-weight:700; text-transform:uppercase; letter-spacing:0.03em; display:block; margin-bottom:6px; }
  .field input, .field select, .field textarea{
    width:100%; background: var(--bg-card); border:1px solid var(--line); border-radius:9px;
    padding:11px 13px; color: var(--text-hi); font-family:'Rajdhani'; font-size:14px; font-weight:600;
  }
  .field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color:var(--flame); }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .auth-screen{ max-width:380px; margin:80px auto; padding:0 20px; }
  .auth-logo{ text-align:center; margin-bottom:30px; }
  .auth-logo .sb-mark{ width:56px;height:56px; margin:0 auto 14px; font-size:22px; border-radius:14px; }
  .auth-tabs{ display:flex; gap:8px; margin-bottom:22px; background:var(--bg-card); padding:4px; border-radius:10px; }
  .auth-tab{ flex:1; padding:9px; border-radius:8px; border:none; background:none; color:var(--text-mid); font-weight:700; font-size:12.5px; cursor:pointer; text-transform:uppercase; }
  .auth-tab.active{ background: var(--flame); color:#fff; }

  .error-msg{ background:#ff3b5c1a; border:1px solid #ff3b5c44; color:var(--danger); padding:10px 12px; border-radius:9px; font-size:12.5px; margin-bottom:14px; display:none; }
  .success-msg{ background:#3ddc841a; border:1px solid #3ddc8444; color:var(--success); padding:10px 12px; border-radius:9px; font-size:12.5px; margin-bottom:14px; display:none; }

  .empty-row td{ text-align:center; color:var(--text-low); padding:40px 0; }

  /* Support Chat */
  .chat-layout{ display:flex; height: calc(100vh - 52px); border:1px solid var(--line); border-radius:14px; overflow:hidden; }
  .conv-list{ width:280px; border-right:1px solid var(--line); overflow-y:auto; flex-shrink:0; }
  .conv-item{ padding:14px 16px; border-bottom:1px solid var(--line); cursor:pointer; position:relative; }
  .conv-item:hover{ background:#ffffff05; }
  .conv-item.active{ background: var(--flame-dim); }
  .conv-name{ font-weight:700; font-size:13.5px; }
  .conv-preview{ font-size:11.5px; color:var(--text-low); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; }
  .conv-unread{ position:absolute; top:14px; right:14px; background:var(--flame); color:#fff; font-size:10px; font-weight:800; border-radius:10px; padding:2px 7px; }
  .chat-panel{ flex:1; display:flex; flex-direction:column; }
  .chat-panel-empty{ flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-low); flex-direction:column; gap:10px; }
  .chat-panel-head{ padding:14px 18px; border-bottom:1px solid var(--line); font-weight:700; }
  .admin-chat-messages{ flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .admin-bubble{ max-width:60%; padding:10px 13px; border-radius:14px; font-size:13.5px; line-height:1.4; }
  .admin-bubble.fromplayer{ align-self:flex-start; background:var(--bg-card); border:1px solid var(--line); }
  .admin-bubble.fromadmin{ align-self:flex-end; background: linear-gradient(135deg, var(--flame), #ffd97a); color:#1a1200; }
  .admin-bubble img{ max-width:100%; border-radius:8px; margin-top:6px; display:block; }
  .admin-chat-time{ font-size:9.5px; opacity:0.6; margin-top:4px; }
  .admin-chat-input{ display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--line); align-items:flex-end; }
  .admin-chat-input textarea{ flex:1; background:var(--bg-card); border:1px solid var(--line); border-radius:10px; padding:10px 13px; color:var(--text-hi); font-family:'Rajdhani'; font-size:14px; resize:none; max-height:80px; }
  .chat-back-btn{ display:none; }
  .loader{ display:flex; justify-content:center; padding:40px 0; color:var(--text-mid); }
  .loader i{ font-size:20px; animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .toast{ position:fixed; bottom:24px; right:24px; background:var(--bg-card); border:1px solid var(--line); padding:13px 18px; border-radius:11px; font-size:13px; font-weight:600; display:none; align-items:center; gap:9px; z-index:300; box-shadow:0 10px 30px -10px #000; }
  .toast.show{ display:flex; }

  .num-input-row{ display:flex; gap:6px; align-items:center; }
  .num-input-row input{ width:60px; padding:6px 8px; font-size:13px; }

  .mobile-hide{ display:block; }
  @media (max-width: 900px){
    .stat-grid{ grid-template-columns:repeat(2,1fr); }
    .layout{ flex-direction:column; }
    .sidebar{ width:100%; flex-direction:row; align-items:center; padding:12px 16px; overflow-x:auto; }
    .sb-brand{ padding:0 10px; flex-shrink:0; }
    .sidebar-bottom{ margin-top:0; margin-left:auto; display:flex; }
    .nav-link{ flex-shrink:0; width:auto; white-space:nowrap; }
    .mobile-hide{ display:none; }
    .main{ padding:18px; }
    table{ font-size:12px; }

    /* Support chat: stack conversation list above chat panel on mobile, toggle between them */
    .chat-layout{ flex-direction:column; height: calc(100vh - 140px); border-radius:10px; }
    .conv-list{ width:100%; border-right:none; border-bottom:1px solid var(--line); max-height:40vh; }
    .chat-layout.chat-open .conv-list{ display:none; }
    .chat-layout:not(.chat-open) .chat-panel{ display:none; }
    .chat-panel{ flex:1; min-height:0; }
    .chat-back-btn{ display:inline-flex !important; }
    .admin-bubble{ max-width:80%; }
  }
</style>
</head>
<body>

<div id="app"></div>
<div class="toast" id="toast"><i class="fa-solid fa-circle-check" id="toast-icon" style="color:var(--success)"></i><span id="toast-msg"></span></div>

<script>
const API_BASE = "https://tournament1-app.onrender.com/api";

let state = {
  token: ls_get('admin_token'),
  user: ls_get('admin_user'),
  authMode: 'login', // login | register
  page: 'tournaments', // tournaments | registrations | createAdmin
  tournaments: [],
  loading: false,
  modal: null, // 'createTournament' | 'editRoom' | 'viewRegs' | 'editResult'
  activeTournament: null,
  registrations: [],
  transactions: [],
  txnLoading: false,
  esewaNumber: '',
  conversations: [],
  activeConversation: null,
  conversationMessages: [],
  pendingChatImage: null,
  supportAdmins: [],
};

function ls_get(k){ try{ const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; }catch(e){ return null; } }
function ls_set(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
function ls_clear(){ localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user'); }

async function api(path, method='GET', body=null, auth=true){
  const headers = {'Content-Type':'application/json'};
  if(auth && state.token) headers['Authorization'] = 'Bearer ' + state.token;
  const res = await fetch(API_BASE + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  const data = await res.json();
  if(!res.ok) throw new Error(data.message || 'Something went wrong');
  return data;
}

// For file uploads (banners, screenshots) - uses FormData, no Content-Type header (browser sets it with boundary)
async function apiUpload(path, formData){
  const headers = {};
  if(state.token) headers['Authorization'] = 'Bearer ' + state.token;
  const res = await fetch(API_BASE + path, { method: 'POST', headers, body: formData });
  const data = await res.json();
  if(!res.ok) throw new Error(data.message || 'Something went wrong');
  return data;
}

function showToast(msg, isError=false){
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  const icon = document.getElementById('toast-icon');
  icon.className = isError ? 'fa-solid fa-circle-exclamation' : 'fa-solid fa-circle-check';
  icon.style.color = isError ? 'var(--danger)' : 'var(--success)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}

function fmtDate(d){
  const dt = new Date(d);
  return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'}) + ' · ' + dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}
function fmtDateInput(d){
  const dt = d ? new Date(d) : new Date();
  return dt.toISOString().slice(0,16);
}

/* ============ RENDER ============ */
function render(){
  const app = document.getElementById('app');
  if(!state.token){
    app.innerHTML = renderAuth();
  } else {
    const defaultPage = state.user?.role === 'support-admin' ? 'support' : 'tournaments';
    app.innerHTML = `
      <div class="layout">
        ${renderSidebar()}
        <div class="main">${
        state.page === 'registrations' ? renderRegistrationsPage() :
        state.page === 'transactions' ? renderTransactionsPage() :
        state.page === 'settings' ? renderSettingsPage() :
        state.page === 'support' ? renderSupportPage() :
        state.page === 'admins' ? renderAdminsPage() :
        (state.user?.role === 'support-admin' ? renderSupportPage() : renderTournamentsPage())
      }</div>
      </div>
      ${renderModal()}
    `;
  }
  attachEvents();
}

function renderAuth(){
  return `
    <div class="auth-screen">
      <div class="auth-logo">
        <div class="sb-mark"><i class="fa-solid fa-crown"></i></div>
        <h1>ClashKing Admin</h1>
        <p style="color:var(--text-mid); font-size:13px; margin-top:4px;">Tournament Control Center</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab ${state.authMode==='login'?'active':''}" data-mode="login">Login</button>
        <button class="auth-tab ${state.authMode==='register'?'active':''}" data-mode="register">First-Time Setup</button>
      </div>
      <div class="error-msg" id="err"></div>
      <div class="success-msg" id="ok"></div>
      ${state.authMode === 'login' ? `
        <div class="field"><label>Phone Number</label><input type="tel" id="phone" placeholder="98XXXXXXXX"></div>
        <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••"></div>
        <button class="btn btn-primary" id="loginBtn" style="width:100%; justify-content:center;"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
      ` : `
        <div class="field"><label>Your Name</label><input type="text" id="name" placeholder="Admin name"></div>
        <div class="field"><label>Phone Number</label><input type="tel" id="phone" placeholder="98XXXXXXXX"></div>
        <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••"></div>
        <div class="field"><label>Admin Secret Key</label><input type="password" id="secretKey" placeholder="From your .env ADMIN_SECRET_KEY"></div>
        <button class="btn btn-primary" id="registerBtn" style="width:100%; justify-content:center;"><i class="fa-solid fa-user-shield"></i> Create Admin Account</button>
        <p style="font-size:11.5px; color:var(--text-low); margin-top:12px; text-align:center;">Only use this once to create your admin account. The secret key is in your Render environment variables.</p>
      `}
    </div>
  `;
}

function renderSidebar(){
  return `
    <div class="sidebar">
      <div class="sb-brand">
        <div class="sb-mark"><i class="fa-solid fa-crown"></i></div>
        <div class="sb-name">CLASH<span>KING</span><small>${state.user?.role === 'support-admin' ? 'SUPPORT ADMIN' : 'ADMIN PANEL'}</small></div>
      </div>
      ${state.user?.role !== 'support-admin' ? `
        <button class="nav-link ${state.page==='tournaments'?'active':''}" data-page="tournaments"><i class="fa-solid fa-trophy"></i> <span class="mobile-hide">Tournaments</span></button>
        <button class="nav-link ${state.page==='registrations'?'active':''}" data-page="registrations"><i class="fa-solid fa-users"></i> <span class="mobile-hide">Players</span></button>
        <button class="nav-link ${state.page==='transactions'?'active':''}" data-page="transactions"><i class="fa-solid fa-money-bill-transfer"></i> <span class="mobile-hide">Wallet Requests</span></button>
      ` : ''}
      <button class="nav-link ${state.page==='support'?'active':''}" data-page="support"><i class="fa-solid fa-headset"></i> <span class="mobile-hide">Support Chats</span></button>
      ${state.user?.role !== 'support-admin' ? `
        <button class="nav-link ${state.page==='admins'?'active':''}" data-page="admins"><i class="fa-solid fa-user-shield"></i> <span class="mobile-hide">Manage Admins</span></button>
        <button class="nav-link ${state.page==='settings'?'active':''}" data-page="settings"><i class="fa-solid fa-gear"></i> <span class="mobile-hide">Settings</span></button>
      ` : ''}
      <div class="sidebar-bottom">
        <button class="nav-link logout-link" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> <span class="mobile-hide">Logout</span></button>
      </div>
    </div>
  `;
}

function renderTournamentsPage(){
  const total = state.tournaments.length;
  const live = state.tournaments.filter(t=>t.status==='Live').length;
  const upcoming = state.tournaments.filter(t=>t.status==='Upcoming').length;
  const totalSlots = state.tournaments.reduce((s,t)=>s+t.filledSlots,0);

  return `
    <div class="topbar">
      <div>
        <div class="page-title">Tournaments</div>
        <div class="page-sub">Create and manage Free Fire & PUBG tournaments</div>
      </div>
      <button class="btn btn-primary" id="newTournamentBtn"><i class="fa-solid fa-plus"></i> New Tournament</button>
    </div>

    <div class="stat-grid">
      <div class="stat-card"><div class="si" style="background:var(--flame-dim);color:var(--flame)"><i class="fa-solid fa-trophy"></i></div><div class="sv">${total}</div><div class="sl">Total Tournaments</div></div>
      <div class="stat-card"><div class="si" style="background:#3ddc8422;color:var(--success)"><i class="fa-solid fa-circle"></i></div><div class="sv">${live}</div><div class="sl">Live Now</div></div>
      <div class="stat-card"><div class="si" style="background:var(--cyan-dim);color:var(--cyan)"><i class="fa-solid fa-clock"></i></div><div class="sv">${upcoming}</div><div class="sl">Upcoming</div></div>
      <div class="stat-card"><div class="si" style="background:#ffc23c22;color:var(--gold)"><i class="fa-solid fa-users"></i></div><div class="sv">${totalSlots}</div><div class="sl">Total Registrations</div></div>
    </div>

    <div class="panel">
      <div class="panel-head"><h3><i class="fa-solid fa-list"></i> All Tournaments</h3></div>
      <table>
        <thead><tr><th>Title</th><th>Game</th><th>Mode</th><th>Slots</th><th>Prize</th><th>Match Date</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>
          ${state.loading ? '<tr><td colspan="8"><div class="loader"><i class="fa-solid fa-spinner"></i></div></td></tr>' : ''}
          ${!state.loading && state.tournaments.length===0 ? '<tr class="empty-row"><td colspan="8">No tournaments yet. Click "New Tournament" to create your first one.</td></tr>' : ''}
          ${state.tournaments.map(t => `
            <tr>
              <td style="font-weight:700;">${t.title}</td>
              <td>${t.game}</td>
              <td><span class="badge ${t.mode==='Free'?'free':'paid'}">${t.mode}</span></td>
              <td>${t.filledSlots}/${t.maxSlots}</td>
              <td style="color:var(--gold); font-weight:700;">₨${t.prizePool}</td>
              <td style="font-size:12.5px; color:var(--text-mid);">${fmtDate(t.matchDate)}</td>
              <td><span class="badge ${t.status.toLowerCase()}">${t.status}</span></td>
              <td>
                <div style="display:flex; gap:6px;">
                  <button class="btn btn-secondary btn-sm" data-action="banner" data-id="${t._id}"><i class="fa-solid fa-image"></i></button>
                  <button class="btn btn-secondary btn-sm" data-action="room" data-id="${t._id}"><i class="fa-solid fa-key"></i></button>
                  <button class="btn btn-secondary btn-sm" data-action="players" data-id="${t._id}"><i class="fa-solid fa-users"></i></button>

/* ============ DATA LOADERS ============ */
async function loadTournaments(){
  state.loading = true; render();
  try{ state.tournaments = await api('/tournaments', 'GET', null, false); }
  catch(e){ showToast(e.message, true); }
  state.loading = false; render();
}

async function loadRegistrations(tournamentId){
  try{ state.registrations = await api('/registrations/tournament/' + tournamentId, 'GET', null, false); }
  catch(e){ showToast(e.message, true); }
}

async function loadTransactions(statusFilter){
  state.txnLoading = true; render();
  try{
    const q = statusFilter ? `?status=${statusFilter}` : '';
    state.transactions = await api('/transactions' + q);
  }catch(e){ showToast(e.message, true); }
  state.txnLoading = false; render();
}

async function loadEsewaSetting(){
  try{
    const data = await api('/transactions/settings/esewa', 'GET', null, false);
    state.esewaNumber = data.esewaNumber;
  }catch(e){ /* silent */ }
}

async function loadConversations(){
  try{
    state.conversations = await api('/support/conversations');
  }catch(e){ showToast(e.message, true); }
}

async function loadConversationMessages(userId){
  try{
    state.conversationMessages = await api('/support/conversations/' + userId);
  }catch(e){ showToast(e.message, true); }
}

async function loadSupportAdmins(){
  try{
    state.supportAdmins = await api('/auth/admin/support-admins');
  }catch(e){ showToast(e.message, true); }
}

/* ============ EVENTS ============ */
function attachEvents(){
  const app = document.getElementById('app');

  // Auth tabs
  app.querySelectorAll('.auth-tab').forEach(btn => {
    btn.onclick = () => { state.authMode = btn.dataset.mode; render(); };
  });

  const loginBtn = document.getElementById('loginBtn');
  if(loginBtn) loginBtn.onclick = async () => {
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const err = document.getElementById('err');
    try{
      const data = await api('/auth/admin/login', 'POST', { phone, password }, false);
      state.token = data.token; state.user = data.user;
      ls_set('admin_token', data.token); ls_set('admin_user', data.user);
      if(data.user.role === 'support-admin'){
        state.page = 'support';
        await loadConversations();
      } else {
        await loadTournaments();
      }
      render();
      setTimeout(setupPushNotifications, 1500);
    }catch(e){ err.textContent = e.message; err.style.display='block'; }
  };

  const registerBtn = document.getElementById('registerBtn');
  if(registerBtn) registerBtn.onclick = async () => {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const secretKey = document.getElementById('secretKey').value;
    const err = document.getElementById('err');
    try{
      const data = await api('/auth/admin/register', 'POST', { name, phone, password, secretKey }, false);
      state.token = data.token; state.user = data.user;
      ls_set('admin_token', data.token); ls_set('admin_user', data.user);
      await loadTournaments();
    }catch(e){ err.textContent = e.message; err.style.display='block'; }
  };

  // Sidebar nav
  app.querySelectorAll('[data-page]').forEach(btn => {
    btn.onclick = async () => {
      state.page = btn.dataset.page;
      if(state.page === 'transactions') await loadTransactions('Pending');
      if(state.page === 'settings') await loadEsewaSetting();
      if(state.page === 'support'){ state.activeConversation = null; await loadConversations(); }
      if(state.page === 'admins') await loadSupportAdmins();
      render();
    };
  });

  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn) logoutBtn.onclick = () => { ls_clear(); state.token=null; state.user=null; render(); };

  // Support chat: select conversation
  app.querySelectorAll('[data-convuser]').forEach(item => {
    item.onclick = async () => {
      const userId = item.dataset.convuser;
      state.activeConversation = state.conversations.find(c => c.userId === userId);
      await loadConversationMessages(userId);
      await loadConversations(); // refresh unread counts
      render();
      const box = document.getElementById('adminChatMessages');
      if(box) box.scrollTop = box.scrollHeight;
    };
  });

  // Mobile: back button to return to conversation list
  const chatBackBtn = document.getElementById('chatBackBtn');
  if(chatBackBtn) chatBackBtn.onclick = () => { state.activeConversation = null; render(); };

  // Support chat: attach image
  const adminChatAttachBtn = document.getElementById('adminChatAttachBtn');
  const adminChatImageInput = document.getElementById('adminChatImageInput');
  if(adminChatAttachBtn && adminChatImageInput){
    adminChatAttachBtn.onclick = () => adminChatImageInput.click();
    adminChatImageInput.onchange = () => {
      const file = adminChatImageInput.files[0];
      if(!file) return;
      state.pendingChatImage = file;
      state.pendingChatImagePreview = URL.createObjectURL(file);
      render();
    };
  }
  const removeAdminChatImageBtn = document.getElementById('removeAdminChatImageBtn');
  if(removeAdminChatImageBtn) removeAdminChatImageBtn.onclick = () => { state.pendingChatImage = null; render(); };

  // Support chat: send reply
  const adminChatSendBtn = document.getElementById('adminChatSendBtn');
  if(adminChatSendBtn) adminChatSendBtn.onclick = async () => {
    const textInput = document.getElementById('adminChatTextInput');
    const text = textInput.value.trim();
    if(!text && !state.pendingChatImage) return;
    adminChatSendBtn.disabled = true;
    try{
      const formData = new FormData();
      if(text) formData.append('text', text);
      if(state.pendingChatImage) formData.append('image', state.pendingChatImage);
      await apiUpload('/support/conversations/' + state.activeConversation.userId + '/reply', formData);
      state.pendingChatImage = null;
      await loadConversationMessages(state.activeConversation.userId);
      await loadConversations();
      render();
      const box = document.getElementById('adminChatMessages');
      if(box) box.scrollTop = box.scrollHeight;
    }catch(e){ showToast(e.message, true); }
    adminChatSendBtn.disabled = false;
  };

  // Manage admins: new support admin
  const newSupportAdminBtn = document.getElementById('newSupportAdminBtn');
  if(newSupportAdminBtn) newSupportAdminBtn.onclick = () => { state.modal = 'newSupportAdmin'; render(); };

  const createSupportAdminBtn = document.getElementById('createSupportAdminBtn');
  if(createSupportAdminBtn) createSupportAdminBtn.onclick = async () => {
    const name = document.getElementById('saName').value.trim();
    const phone = document.getElementById('saPhone').value.trim();
    const password = document.getElementById('saPassword').value;
    const err = document.getElementById('err');
    if(!name || !phone || !password){ err.textContent='All fields are required'; err.style.display='block'; return; }
    try{
      await api('/auth/admin/create-support-admin', 'POST', { name, phone, password });
      showToast('Support admin created! ✅');
      state.modal = null;
      await loadSupportAdmins();
      render();
    }catch(e){ err.textContent = e.message; err.style.display='block'; }
  };

  app.querySelectorAll('[data-removeadmin]').forEach(btn => {
    btn.onclick = async () => {
      if(!confirm('Remove this support admin\'s access?')) return;
      try{
        await api('/auth/admin/support-admins/' + btn.dataset.removeadmin, 'DELETE');
        showToast('Support admin removed');
        await loadSupportAdmins();
        render();
      }catch(e){ showToast(e.message, true); }
    };
  });

  // New tournament
  const newBtn = document.getElementById('newTournamentBtn');
  if(newBtn) newBtn.onclick = () => { state.modal = 'createTournament'; render(); };

  const closeModal = document.getElementById('closeModal');
  if(closeModal) closeModal.onclick = () => { state.modal = null; state.activeTournament = null; render(); };

  // Banner upload
  const uploadBannerBtn = document.getElementById('uploadBannerBtn');
  if(uploadBannerBtn) uploadBannerBtn.onclick = async () => {
    const fileInput = document.getElementById('bannerFile');
    const err = document.getElementById('err');
    if(!fileInput.files[0]){ err.textContent = 'Please choose an image first'; err.style.display='block'; return; }
    uploadBannerBtn.disabled = true;
    uploadBannerBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading...';
    try{
      const formData = new FormData();
      formData.append('banner', fileInput.files[0]);
      await apiUpload('/tournaments/' + state.activeTournament._id + '/banner', formData);
      showToast('Banner uploaded! 🖼️');
      state.modal = null; state.activeTournament = null;
      await loadTournaments();
    }catch(e){
      err.textContent = e.message; err.style.display='block';
      uploadBannerBtn.disabled = false; uploadBannerBtn.innerHTML = '<i class="fa-solid fa-upload"></i> Upload Banner';
    }
  };

  const skipBannerBtn = document.getElementById('skipBannerBtn');
  if(skipBannerBtn) skipBannerBtn.onclick = () => { state.modal = null; state.activeTournament = null; render(); };

  const saveTournamentBtn = document.getElementById('saveTournamentBtn');
  if(saveTournamentBtn) saveTournamentBtn.onclick = async () => {
    const err = document.getElementById('err');
    const payload = {
      title: document.getElementById('title').value.trim(),
      game: document.getElementById('game').value,
      matchType: document.getElementById('matchType').value,
      mode: document.getElementById('mode').value,
      entryFee: Number(document.getElementById('entryFee').value),
      prizePool: Number(document.getElementById('prizePool').value),
      perKillReward: Number(document.getElementById('perKillReward').value),
      maxSlots: Number(document.getElementById('maxSlots').value),
      matchDate: document.getElementById('matchDate').value,
      description: document.getElementById('description').value,
    };
    if(!payload.title){ err.textContent='Title is required'; err.style.display='block'; return; }
    try{
      const newTournament = await api('/tournaments', 'POST', payload);
      showToast('Tournament created! 🏆');
      state.modal = 'banner';
      state.activeTournament = newTournament;
      await loadTournaments();
      render();
    }catch(e){ err.textContent = e.message; err.style.display='block'; }
  };

  // Table row actions
  app.querySelectorAll('[data-action="banner"]').forEach(btn => {
    btn.onclick = () => {
      state.activeTournament = state.tournaments.find(t => t._id === btn.dataset.id);
      state.modal = 'banner'; render();
    };
  });

  app.querySelectorAll('[data-action="room"]').forEach(btn => {
    btn.onclick = () => {
      state.activeTournament = state.tournaments.find(t => t._id === btn.dataset.id);
      state.modal = 'room'; render();
    };
  });

  app.querySelectorAll('[data-action="players"]').forEach(btn => {
    btn.onclick = async () => {
      state.activeTournament = state.tournaments.find(t => t._id === btn.dataset.id);
      await loadRegistrations(btn.dataset.id);
      state.modal = 'players'; render();
    };
  });

  app.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.onclick = async () => {
      if(!confirm('Delete this tournament? This cannot be undone.')) return;
      try{
        await api('/tournaments/' + btn.dataset.id, 'DELETE');
        showToast('Tournament deleted');
        await loadTournaments();
      }catch(e){ showToast(e.message, true); }
    };
  });

  const saveRoomBtn = document.getElementById('saveRoomBtn');
  if(saveRoomBtn) saveRoomBtn.onclick = async () => {
    const t = state.activeTournament;
    const payload = {
      status: document.getElementById('status').value,
      roomId: document.getElementById('roomId').value,
      roomPassword: document.getElementById('roomPassword').value,
    };
    try{
      await api('/tournaments/' + t._id, 'PUT', payload);
      showToast('Room details updated! 🔑');
      state.modal = null;
      await loadTournaments();
    }catch(e){ showToast(e.message, true); }
  };

  // Payment verify/reject
  app.querySelectorAll('[data-payaction]').forEach(btn => {
    btn.onclick = async () => {
      try{
        await api('/registrations/' + btn.dataset.regid + '/payment', 'PUT', { paymentStatus: btn.dataset.payaction });
        showToast('Payment ' + btn.dataset.payaction.toLowerCase());
        await loadRegistrations(state.activeTournament._id);
        render();
      }catch(e){ showToast(e.message, true); }
    };
  });

  // Save result row
  app.querySelectorAll('[data-action="saveResult"]').forEach(btn => {
    btn.onclick = async () => {
      const regId = btn.dataset.regid;
      const row = document.querySelector(`tr[data-reg-id="${regId}"]`);
      const kills = Number(row.querySelector('[data-field="kills"]').value);
      const rank = Number(row.querySelector('[data-field="rank"]').value);
      const points = Number(row.querySelector('[data-field="points"]').value);
      const bonusPrize = Number(row.querySelector('[data-field="bonusPrize"]').value) || 0;
      try{
        await api('/registrations/' + regId + '/result', 'PUT', { kills, rank, points, bonusPrize });
        showToast('Result saved! 📊');
        await loadRegistrations(state.activeTournament._id);
        render();
      }catch(e){ showToast(e.message, true); }
    };
  });

  // Screenshot verify/reject
  app.querySelectorAll('[data-ssaction]').forEach(btn => {
    btn.onclick = async () => {
      try{
        await api('/registrations/' + btn.dataset.regid + '/screenshot-status', 'PUT', { screenshotStatus: btn.dataset.ssaction });
        showToast('Screenshot ' + btn.dataset.ssaction.toLowerCase());
        await loadRegistrations(state.activeTournament._id);
        render();
      }catch(e){ showToast(e.message, true); }
    };
  });

  // Transaction filter dropdown
  const txnFilter = document.getElementById('txnFilter');
  if(txnFilter) txnFilter.onchange = async () => { await loadTransactions(txnFilter.value); };

  // Transaction approve/reject
  app.querySelectorAll('[data-txnaction]').forEach(btn => {
    btn.onclick = async () => {
      const action = btn.dataset.txnaction; // approve | reject
      if(action === 'reject' && !confirm('Reject this transaction?')) return;
      try{
        await api('/transactions/' + btn.dataset.txnid + '/' + action, 'PUT', {});
        showToast('Transaction ' + (action === 'approve' ? 'approved! ✅' : 'rejected'));
        const currentFilter = document.getElementById('txnFilter')?.value || 'Pending';
        await loadTransactions(currentFilter);
      }catch(e){ showToast(e.message, true); }
    };
  });

  // Settings - save eSewa number
  const saveEsewaBtn = document.getElementById('saveEsewaBtn');
  if(saveEsewaBtn) saveEsewaBtn.onclick = async () => {
    const esewaNumber = document.getElementById('esewaInput').value.trim();
    try{
      await api('/transactions/settings/esewa', 'PUT', { esewaNumber });
      showToast('eSewa number updated! ✅');
      const ok = document.getElementById('settingsOk');
      if(ok){ ok.textContent = 'Saved successfully'; ok.style.display='block'; }
    }catch(e){ showToast(e.message, true); }
  };
}

/* ============ INIT ============ */
/* ============== PUSH NOTIFICATIONS ============== */
async function setupPushNotifications(){
  // Only works inside the Capacitor APK wrapper - silently does nothing on a plain web browser
  try{
    if(!window.Capacitor || !window.Capacitor.isNativePlatform || !window.Capacitor.isNativePlatform()) return;
    if(!window.Capacitor.Plugins || !window.Capacitor.Plugins.PushNotifications) return;
  }catch(e){ return; }

  const { PushNotifications } = window.Capacitor.Plugins;

  try{
    let permStatus;
    try{
      permStatus = await PushNotifications.checkPermissions();
    }catch(e){ return; }

    if(permStatus.receive !== 'granted'){
      try{
        const req = await PushNotifications.requestPermissions();
        if(req.receive !== 'granted') return;
      }catch(e){ return; }
    }

    try{
      await PushNotifications.register();
    }catch(e){ return; }

    PushNotifications.addListener('registration', async (token) => {
      try{
        await api('/auth/fcm-token', 'PUT', { fcmToken: token.value });
      }catch(e){ /* silent */ }
    });

    PushNotifications.addListener('registrationError', (err) => {
      console.error('Push registration error:', err);
    });

    PushNotifications.addListener('pushNotificationActionPerformed', (action) => {
      state.page = 'support';
      loadConversations().then(render);
    });
  }catch(e){ /* silent - push notifications are a nice-to-have, never block the app */ }
}

/* ============== INIT ============== */
(async function init(){
  if(state.token){
    if(state.user?.role === 'support-admin'){
      state.page = 'support';
      await loadConversations();
    } else {
      await loadTournaments();
    }
    setTimeout(setupPushNotifications, 1500);
  }
  render();
})();
</script>
